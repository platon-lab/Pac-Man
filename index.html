<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PacMan Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
  body {
    background: #0a0a1a;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 420px; padding: 12px; }
  .screen.active { display: flex; }

  /* CHARACTER SELECT */
  #selectScreen h1 {
    font-size: 1.6rem;
    color: #ffe000;
    text-shadow: 0 0 20px #ffe000aa;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  #selectScreen p { font-size: 0.75rem; color: #aaa; margin-bottom: 14px; }

  .char-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .char-btn {
    width: 64px;
    background: #111133;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 6px 4px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .char-btn img {
    width: 44px;
    height: 44px;
    object-fit: contain;
    border-radius: 6px;
  }
  .char-btn span {
    font-size: 0.55rem;
    color: #ccc;
    text-align: center;
    line-height: 1.1;
  }
  .char-btn.selected {
    border-color: #ffe000;
    background: #22224a;
    box-shadow: 0 0 12px #ffe00066;
  }
  .char-btn:active { transform: scale(0.93); }

  #playBtn {
    background: #ffe000;
    color: #000;
    border: none;
    border-radius: 30px;
    padding: 12px 48px;
    font-size: 1.1rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 24px #ffe00066;
    transition: all 0.2s;
  }
  #playBtn:active { transform: scale(0.95); }
  #playBtn:disabled { opacity: 0.4; cursor: default; }

  /* GAME SCREEN */
  #gameScreen {
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 0;
  }

  #hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 6px 10px;
    background: #0a0a1a;
    border-bottom: 1px solid #222;
  }
  #hud .score-box { font-size: 0.9rem; color: #ffe000; letter-spacing: 1px; }
  #hud .level-box { font-size: 0.75rem; color: #aaa; }
  #pauseBtn {
    background: #222;
    border: 1px solid #444;
    border-radius: 6px;
    color: #fff;
    font-size: 0.75rem;
    padding: 4px 8px;
    cursor: pointer;
  }

  #canvas {
    display: block;
    background: #0d0d1f;
    width: 100%;
    max-width: 420px;
  }

  /* OVERLAYS */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000cc;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 2rem; color: #ffe000; text-shadow: 0 0 20px #ffe000; letter-spacing: 3px; }
  .overlay p { font-size: 1rem; color: #ccc; }
  .overlay button {
    background: #ffe000;
    color: #000;
    border: none;
    border-radius: 24px;
    padding: 10px 36px;
    font-size: 1rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .overlay button.secondary {
    background: #333;
    color: #fff;
    font-size: 0.85rem;
    padding: 8px 24px;
  }
</style>
</head>
<body>

<!-- CHARACTER SELECT SCREEN -->
<div id="selectScreen" class="screen active">
  <h1>🎮 PAC-ADVENTURE</h1>
  <p>Оберіть персонажа</p>
  <div class="char-grid">
    <div class="char-btn" onclick="selectChar(0)">
      <img src="Tito.png" onerror="this.src=''" alt="Tito">
      <span>Tito</span>
    </div>
    <div class="char-btn" onclick="selectChar(1)">
      <img src="Smartik.png" onerror="this.src=''" alt="Smartik">
      <span>Smartik</span>
    </div>
    <div class="char-btn" onclick="selectChar(2)">
      <img src="Junior.png" onerror="this.src=''" alt="Junior">
      <span>Junior</span>
    </div>
    <div class="char-btn" onclick="selectChar(3)">
      <img src="Fil.png" onerror="this.src=''" alt="Fil">
      <span>Fil</span>
    </div>
    <div class="char-btn" onclick="selectChar(4)">
      <img src="Milka.png" onerror="this.src=''" alt="Milka">
      <span>Milka</span>
    </div>
    <div class="char-btn" onclick="selectChar(5)">
      <img src="Bark.png" onerror="this.src=''" alt="Bark">
      <span>Bark</span>
    </div>
  </div>
  <button id="playBtn" onclick="startGame()" disabled>▶ ГРАТИ</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
  <div id="hud">
    <div class="score-box">⭐ <span id="scoreVal">0</span></div>
    <div class="level-box">РІВЕНЬ <span id="levelVal">1</span></div>
    <button id="pauseBtn" onclick="togglePause()">⏸</button>
  </div>
  <canvas id="canvas"></canvas>
</div>

<!-- PAUSE OVERLAY -->
<div id="pauseOverlay" class="overlay">
  <h2>ПАУЗА</h2>
  <button onclick="togglePause()">▶ ПРОДОВЖИТИ</button>
  <button class="secondary" onclick="goMenu()">🏠 МЕНЮ</button>
</div>

<!-- GAME OVER OVERLAY -->
<div id="gameOverOverlay" class="overlay">
  <h2>💀 ПРОГРАШ</h2>
  <p id="goScore"></p>
  <button onclick="restartGame()">🔄 ЗНОВУ</button>
  <button class="secondary" onclick="goMenu()">🏠 МЕНЮ</button>
</div>

<!-- WIN OVERLAY -->
<div id="winOverlay" class="overlay">
  <h2>🎉 ПЕРЕМОГА!</h2>
  <p id="winScore"></p>
  <button onclick="nextLevel()">➡ ДАЛІ</button>
  <button class="secondary" onclick="goMenu()">🏠 МЕНЮ</button>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const CHARS = ['Tito','Smartik','Junior','Fil','Milka', 'Bark'];
const ENEMY_COLORS = ['#ff4466','#ff8800','#cc44ff','#44ffcc'];
const CELL = 22; // cell size px
const COLS = 17;
const ROWS = 21;

let selectedChar = -1;
let charImg = null;
let score = 0;
let level = 1;
let paused = false;
let gameRunning = false;
let animId = null;

// ============================================================
// CHARACTER SELECT
// ============================================================
function selectChar(idx) {
  selectedChar = idx;
  document.querySelectorAll('.char-btn').forEach((b,i) => b.classList.toggle('selected', i===idx));
  document.getElementById('playBtn').disabled = false;

  charImg = new Image();
  charImg.src = CHARS[idx] + '.png';
}

// ============================================================
// MAZE GENERATION
// ============================================================
// 0=path, 1=wall, 2=dot, 3=power-up
let maze = [];

function generateMaze() {
  // Start with all walls
  let m = Array.from({length:ROWS}, () => Array(COLS).fill(1));

  // Recursive backtracker on odd cells
  function carve(r, c) {
    const dirs = shuffle([[0,2],[0,-2],[2,0],[-2,0]]);
    for (let [dr, dc] of dirs) {
      let nr = r+dr, nc = c+dc;
      if (nr>0 && nr<ROWS-1 && nc>0 && nc<COLS-1 && m[nr][nc]===1) {
        m[r+dr/2][c+dc/2] = 0;
        m[nr][nc] = 0;
        carve(nr, nc);
      }
    }
  }

  // Start carving from (1,1)
  m[1][1] = 0;
  carve(1,1);

  // Ensure border is wall, fill dots
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      if (r===0||r===ROWS-1||c===0||c===COLS-1) m[r][c]=1;
      else if (m[r][c]===0) m[r][c]=2; // dot
    }
  }

  // Place power-ups at corners-ish
  const pwrPositions = [[1,1],[1,COLS-2],[ROWS-2,1],[ROWS-2,COLS-2]];
  for (let [r,c] of pwrPositions) {
    if (m[r][c]===2) m[r][c]=3;
  }

  return m;
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function getFreeCells(m) {
  let cells = [];
  for (let r=1; r<ROWS-1; r++)
    for (let c=1; c<COLS-1; c++)
      if (m[r][c]!==1) cells.push({r,c});
  return cells;
}

// ============================================================
// GAME STATE
// ============================================================
let player, enemies, totalDots, powerTimer;

function initLevel() {
  maze = generateMaze();
  let free = getFreeCells(maze);

  // Player start
  player = {
    r: 1, c: 1,
    dr: 0, dc: 0,
    nextDr: 0, nextDc: 0,
    moveTimer: 0,
    moveInterval: Math.max(4, 8 - level),
    powered: false,
    poweredTimer: 0,
  };
  // Ensure player start is clear
  if (maze[1][1]===3) maze[1][1]=2;

  // Enemies
  let numEnemies = Math.min(2 + Math.floor(level/2), 4);
  enemies = [];
  for (let i=0; i<numEnemies; i++) {
    let pos;
    do { pos = free[Math.floor(Math.random()*free.length)]; }
    while (Math.abs(pos.r-1)<4 && Math.abs(pos.c-1)<4);
    enemies.push({
      r: pos.r, c: pos.c,
      dr: 0, dc: 0,
      moveTimer: 0,
      moveInterval: Math.max(6, 12 - level),
      scared: false,
    });
  }

  totalDots = 0;
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (maze[r][c]===2||maze[r][c]===3) totalDots++;

  powerTimer = 0;
}

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth, 420);
  const scale = maxW / (COLS * CELL);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  canvas.style.width = (COLS * CELL * scale) + 'px';
  canvas.style.height = (ROWS * CELL * scale) + 'px';
}

// ============================================================
// GAME LOOP
// ============================================================
let tick = 0;

function gameLoop() {
  if (!paused && gameRunning) {
    tick++;
    update();
    draw();
  }
  animId = requestAnimationFrame(gameLoop);
}

function update() {
  // Player movement
  player.moveTimer++;
  if (player.moveTimer >= player.moveInterval) {
    player.moveTimer = 0;
    // Try next direction
    let nr = player.r + player.nextDr;
    let nc = player.c + player.nextDc;
    if (canMove(nr, nc)) {
      player.dr = player.nextDr;
      player.dc = player.nextDc;
    }
    // Move in current direction
    nr = player.r + player.dr;
    nc = player.c + player.dc;
    if (canMove(nr, nc)) {
      player.r = nr;
      player.c = nc;
    }
    // Collect
    if (maze[player.r][player.c]===2) {
      maze[player.r][player.c]=0;
      score++;
      totalDots--;
      updateHUD();
    } else if (maze[player.r][player.c]===3) {
      maze[player.r][player.c]=0;
      score+=5;
      totalDots--;
      player.powered = true;
      player.poweredTimer = 180;
      enemies.forEach(e=>e.scared=true);
      updateHUD();
    }
  }

  // Power timer
  if (player.powered) {
    player.poweredTimer--;
    if (player.poweredTimer<=0) {
      player.powered = false;
      enemies.forEach(e=>e.scared=false);
    }
  }

  // Enemy movement
  enemies.forEach(enemy => {
    enemy.moveTimer++;
    if (enemy.moveTimer >= enemy.moveInterval) {
      enemy.moveTimer = 0;
      moveEnemy(enemy);
    }
    // Collision
    if (enemy.r===player.r && enemy.c===player.c) {
      if (player.powered) {
        // Eat enemy - respawn
        score += 20;
        let free = getFreeCells(maze);
        let pos;
        do { pos = free[Math.floor(Math.random()*free.length)]; }
        while (Math.abs(pos.r-player.r)<4 && Math.abs(pos.c-player.c)<4);
        enemy.r=pos.r; enemy.c=pos.c;
        enemy.scared=false;
        updateHUD();
      } else {
        gameOver();
      }
    }
  });

  // Win check
  if (totalDots <= 0) {
    win();
  }
}

function canMove(r, c) {
  return r>=0 && r<ROWS && c>=0 && c<COLS && maze[r][c]!==1;
}

function moveEnemy(enemy) {
  const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
  let possible = dirs.filter(([dr,dc]) => canMove(enemy.r+dr, enemy.c+dc));
  if (possible.length===0) return;

  // Chase or random
  let chase = Math.random() < 0.45 + level*0.05;
  if (enemy.scared) chase = false; // run random when scared

  if (chase) {
    possible.sort((a,b) => {
      let da = Math.abs(enemy.r+a[0]-player.r)+Math.abs(enemy.c+a[1]-player.c);
      let db = Math.abs(enemy.r+b[0]-player.r)+Math.abs(enemy.c+b[1]-player.c);
      return da-db;
    });
    let [dr,dc] = possible[0];
    enemy.r+=dr; enemy.c+=dc;
  } else {
    // Avoid going back unless necessary
    let filtered = possible.filter(([dr,dc])=>!(dr===-enemy.dr&&dc===-enemy.dc));
    if (filtered.length===0) filtered=possible;
    let [dr,dc] = filtered[Math.floor(Math.random()*filtered.length)];
    enemy.dr=dr; enemy.dc=dc;
    enemy.r+=dr; enemy.c+=dc;
  }
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw maze
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      let x=c*CELL, y=r*CELL;
      if (maze[r][c]===1) {
        // Wall
        ctx.fillStyle='#1a1a4a';
        ctx.fillRect(x,y,CELL,CELL);
        ctx.strokeStyle='#2a2a6a';
        ctx.lineWidth=0.5;
        ctx.strokeRect(x,y,CELL,CELL);
      } else if (maze[r][c]===2) {
        // Dot
        ctx.fillStyle='#ffe000';
        ctx.beginPath();
        ctx.arc(x+CELL/2, y+CELL/2, 2.5, 0, Math.PI*2);
        ctx.fill();
      } else if (maze[r][c]===3) {
        // Power-up
        let pulse = 0.7 + 0.3*Math.sin(tick*0.15);
        ctx.fillStyle=`rgba(255,180,0,${pulse})`;
        ctx.beginPath();
        ctx.arc(x+CELL/2, y+CELL/2, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath();
        ctx.arc(x+CELL/2, y+CELL/2, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }

  // Draw enemies
  enemies.forEach((enemy, i) => {
    let x = enemy.c*CELL + CELL/2;
    let y = enemy.r*CELL + CELL/2;
    let r = CELL/2 - 2;

    if (enemy.scared) {
      // Scared - blue flashing
      let flash = player.poweredTimer < 60 && tick%20<10;
      ctx.fillStyle = flash ? '#ffffff' : '#3355ff';
    } else {
      ctx.fillStyle = ENEMY_COLORS[i % ENEMY_COLORS.length];
    }

    // Ghost shape
    ctx.beginPath();
    ctx.arc(x, y-1, r, Math.PI, 0);
    ctx.lineTo(x+r, y+r-1);
    let wavy = 3;
    for (let w=0; w<wavy; w++) {
      let wx = x+r - (w*2*r/wavy);
      ctx.quadraticCurveTo(wx - r/wavy, y+r+3, wx - 2*r/wavy, y+r-1);
    }
    ctx.lineTo(x-r, y-1);
    ctx.closePath();
    ctx.fill();

    if (!enemy.scared) {
      // Eyes
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(x-3, y-3, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+3, y-3, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath(); ctx.arc(x-2, y-3, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+4, y-3, 1.5, 0, Math.PI*2); ctx.fill();
    }
  });

  // Draw player
  let px = player.c*CELL;
  let py = player.r*CELL;
  if (charImg && charImg.complete && charImg.naturalWidth>0) {
    // Power glow
    if (player.powered) {
      ctx.save();
      ctx.shadowColor='#ffe000';
      ctx.shadowBlur = 12 + 6*Math.sin(tick*0.2);
    }
    ctx.drawImage(charImg, px+1, py+1, CELL-2, CELL-2);
    if (player.powered) ctx.restore();
  } else {
    // Fallback circle
    ctx.fillStyle = player.powered ? '#ffe000' : '#ffcc00';
    ctx.beginPath();
    ctx.arc(px+CELL/2, py+CELL/2, CELL/2-2, 0.2, Math.PI*1.8);
    ctx.lineTo(px+CELL/2, py+CELL/2);
    ctx.closePath();
    ctx.fill();
  }
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('levelVal').textContent = level;
}

// ============================================================
// GAME STATES
// ============================================================
function startGame() {
  if (selectedChar<0) return;
  score = 0;
  level = 1;
  showScreen('gameScreen');
  resizeCanvas();
  initLevel();
  updateHUD();
  gameRunning = true;
  paused = false;
  if (animId) cancelAnimationFrame(animId);
  gameLoop();
}

function restartGame() {
  document.getElementById('gameOverOverlay').classList.remove('show');
  score = 0;
  initLevel();
  updateHUD();
  gameRunning = true;
  paused = false;
}

function nextLevel() {
  document.getElementById('winOverlay').classList.remove('show');
  level++;
  initLevel();
  updateHUD();
  gameRunning = true;
  paused = false;
}

function gameOver() {
  gameRunning = false;
  document.getElementById('goScore').textContent = `Рахунок: ${score}`;
  document.getElementById('gameOverOverlay').classList.add('show');
}

function win() {
  gameRunning = false;
  document.getElementById('winScore').textContent = `Рахунок: ${score} | Рівень ${level}`;
  document.getElementById('winOverlay').classList.add('show');
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
  document.getElementById('pauseOverlay').classList.toggle('show', paused);
}

function goMenu() {
  gameRunning = false;
  paused = false;
  document.getElementById('pauseOverlay').classList.remove('show');
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('winOverlay').classList.remove('show');
  if (animId) cancelAnimationFrame(animId);
  showScreen('selectScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
// INPUT
// ============================================================
// Keyboard
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:    [-1,0],
    ArrowDown:  [1,0],
    ArrowLeft:  [0,-1],
    ArrowRight: [0,1],
    'w': [-1,0], 's': [1,0], 'a': [0,-1], 'd': [0,1],
  };
  if (map[e.key]) {
    e.preventDefault();
    let [dr,dc] = map[e.key];
    player.nextDr=dr; player.nextDc=dc;
  }
  if (e.key==='Escape') togglePause();
});

// Touch swipe
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

canvas.addEventListener('touchend', e=>{
  let dx = e.changedTouches[0].clientX - touchStartX;
  let dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx)<15 && Math.abs(dy)<15) return;
  if (Math.abs(dx)>Math.abs(dy)) {
    player.nextDr=0; player.nextDc=dx>0?1:-1;
  } else {
    player.nextDc=0; player.nextDr=dy>0?1:-1;
  }
}, {passive:true});

window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
